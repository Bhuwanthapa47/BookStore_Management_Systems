# Production Profile - Supabase PostgreSQL Database
# Server
server.port=${PORT:8080}

# Supabase PostgreSQL Database
# Replace these values with your actual Supabase credentials
spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://db.your-project-ref.supabase.co:5432/postgres}
spring.datasource.username=${SUPABASE_DB_USER:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD:your-supabase-password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool settings for production
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# JWT
jwt.secret=${JWT_SECRET:bookstore_super_secret_key_2024_very_long_and_secure_string_for_jwt}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# CORS - Update with your frontend URL
spring.web.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}

# Logging
logging.level.root=INFO
logging.level.com.bookstore=INFO
