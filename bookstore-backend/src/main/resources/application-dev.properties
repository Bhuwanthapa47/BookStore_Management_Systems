# Development Profile - MySQL Local Database
# Copy this file and set your local MySQL credentials
# This file should NOT be committed to version control with real passwords

# Server
server.port=8080

# MySQL Database - Use environment variables or update with your credentials
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/bookstore_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=bookstore_super_secret_key_2024_very_long_and_secure_string_for_jwt
jwt.expiration=86400000

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# CORS
spring.web.cors.allowed-origins=http://localhost:5173
