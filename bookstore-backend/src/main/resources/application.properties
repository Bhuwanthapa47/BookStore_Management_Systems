# Active Profile (dev = MySQL local, prod = Supabase PostgreSQL)
# Use 'dev' for local development, 'prod' for production deployment
spring.profiles.active=${SPRING_PROFILE:dev}

# Server
server.port=${PORT:8080}

# Database Configuration (Uses Environment Variables)
# For local development: Set these in your IDE or use application-dev.properties
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/bookstore_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration
jwt.secret=${JWT_SECRET:please-change-this-secret-key-in-production}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# CORS
spring.web.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}
